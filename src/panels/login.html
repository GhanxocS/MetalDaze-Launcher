<div class="container">

    <!-- ── Panel principal ── -->
    <div class="login-panel">

        <!-- Branding -->
        <div class="login-brand">
            <div class="login-logo">
                <span class="login-logo-text">MD</span>
                <div class="login-logo-glow"></div>
            </div>
            <div class="login-brand-name">MetalDaze</div>
            <div class="login-brand-sub">ESTUDIO</div>
        </div>

        <!-- ── Tab: selección de método ── -->
        <div class="login-home login-tabs">
            <div class="login-section-title">Iniciar sesión</div>
            <div class="login-methods">
                <button class="method-btn method-microsoft connect-home">
                    <span class="method-icon">
                        <svg width="18" height="18" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                            <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                            <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                            <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
                        </svg>
                    </span>
                    <span class="method-label">Cuenta Microsoft</span>
                    <span class="method-arrow">→</span>
                </button>
                <button class="method-btn method-mojang connect-mojang">
                    <span class="method-icon method-icon-mojang">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 2a8 8 0 1 1 0 16A8 8 0 0 1 12 4zM9 7v6.5l1.5.87V9h1v6.26l1.5.87V7H15v8l-3 1.73L9 15V7H9z"/>
                        </svg>
                    </span>
                    <span class="method-label">Cuenta Mojang</span>
                    <span class="method-arrow">→</span>
                </button>
            </div>
            <button class="cancel cancel-home login-cancel" style="display: none;">← Volver</button>
        </div>

        <!-- ── Tab: login offline ── -->
        <div class="login-offline login-tabs">
            <div class="login-section-title">Modo sin conexión</div>
            <div class="login-form">
                <div class="login-field">
                    <label class="login-label">Nombre de usuario</label>
                    <input type="text" class="login-input email email-offline" placeholder="Tu apodo..." />
                </div>
            </div>
            <div class="login-actions">
                <button class="connect connect-offline login-btn-primary">Entrar</button>
                <button class="cancel cancel-offline login-btn-ghost" style="display: none;">← Volver</button>
            </div>
        </div>

        <!-- ── Tab: AZauth ── -->
        <div class="login-AZauth login-tabs">
            <div class="login-section-title">Iniciar sesión</div>
            <div class="login-form">
                <div class="login-field">
                    <label class="login-label">Correo electrónico</label>
                    <input type="text" class="login-input email email-AZauth" placeholder="correo@ejemplo.com" />
                </div>
                <div class="login-field">
                    <label class="login-label">Contraseña</label>
                    <input type="password" class="login-input password password-AZauth" placeholder="••••••••" />
                </div>
            </div>
            <div class="login-actions">
                <button class="connect connect-AZauth login-btn-primary">Iniciar sesión</button>
                <button class="cancel cancel-AZauth login-btn-ghost" style="display: none;">← Volver</button>
            </div>
        </div>

        <!-- ── Tab: AZauth A2F ── -->
        <div class="login-AZauth-A2F login-tabs">
            <div class="login-section-title">Verificación en 2 pasos</div>
            <div class="login-form">
                <div class="login-field">
                    <label class="login-label">Código de seguridad</label>
                    <input type="text" class="login-input A2F A2F-AZauth" placeholder="000000" maxlength="6" />
                </div>
            </div>
            <div class="login-actions">
                <button class="connect connect-AZauth-A2F login-btn-primary">Verificar</button>
                <button class="cancel cancel-AZauth-A2F login-btn-ghost">← Volver</button>
            </div>
        </div>

    </div>

</div>
